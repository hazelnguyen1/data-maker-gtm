    <header>
        <h1>Công ty Chứng khoán Mẫu</h1>
        <nav>
            <ul>
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="open-account.html">Mở tài khoản</a></li>
                <li><a href="register-products.html">Đăng ký sản phẩm</a></li>
                <li><a href="purchase.html">Mua hàng</a></li> <!-- Link mới cho trang này -->
            </ul>
        </nav>
    </header>

    <main>
        <section id="purchase">
            <h2>Mua Sản Phẩm Chứng Khoán</h2>
            <p>Chọn sản phẩm để mua (giả lập - không xử lý thanh toán thực tế).</p>
            <form id="purchaseForm">
                <label>
                    <input type="radio" name="product" value="Margin" required> Margin (Giá: 1.000.000 VNĐ)
                </label>
                <label>
                    <input type="radio" name="product" value="Chứng chỉ quỹ"> Chứng chỉ quỹ (Giá: 500.000 VNĐ)
                </label>
                <label>
                    <input type="radio" name="product" value="Phái sinh"> Phái sinh (Giá: 2.000.000 VNĐ)
                </label>
                
                <label for="quantity">Số lượng:</label>
                <input type="number" id="quantity" name="quantity" min="1" value="1" required>
                
                <button type="submit">Mua Ngay</button>
            </form>
            <p id="purchase-message"></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Công ty Chứng khoán Mẫu. Tất cả quyền được bảo lưu.</p>
    </footer>
